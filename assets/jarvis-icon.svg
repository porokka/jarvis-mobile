<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="eyeglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="47%" r="55%">
      <stop offset="0%" stop-color="#0b1828"/>
      <stop offset="70%" stop-color="#07080f"/>
      <stop offset="100%" stop-color="#06060b"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="160" fill="#06060b"/>
  <rect width="1024" height="1024" rx="160" fill="url(#bg)"/>

  <!-- Eye socket halos (subtle) -->
  <ellipse cx="390" cy="410" rx="72" ry="52" fill="#1a3a5a" opacity="0.35"/>
  <ellipse cx="634" cy="410" rx="72" ry="52" fill="#1a3a5a" opacity="0.35"/>

  <!-- Wireframe edges -->
  <g stroke="#40a0f0" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.58" filter="url(#glow)">
    <!-- skull crown -->
    <line x1="512" y1="121.8" x2="368.1" y2="166.5"/>
    <line x1="512" y1="121.8" x2="655.9" y2="166.5"/>
    <line x1="368.1" y1="166.5" x2="287.5" y2="251.7"/>
    <line x1="655.9" y1="166.5" x2="736.5" y2="251.7"/>
    <line x1="368.1" y1="166.5" x2="391.2" y2="236.9"/>
    <line x1="655.9" y1="166.5" x2="632.8" y2="236.9"/>
    <line x1="391.2" y1="236.9" x2="512" y2="219.9"/>
    <line x1="632.8" y1="236.9" x2="512" y2="219.9"/>
    <line x1="512" y1="121.8" x2="512" y2="219.9"/>
    <line x1="287.5" y1="251.7" x2="391.2" y2="236.9"/>
    <line x1="736.5" y1="251.7" x2="632.8" y2="236.9"/>
    <!-- forehead -->
    <line x1="391.2" y1="236.9" x2="412.9" y2="343"/>
    <line x1="632.8" y1="236.9" x2="611.1" y2="343"/>
    <line x1="512" y1="219.9" x2="512" y2="351.6"/>
    <line x1="287.5" y1="251.7" x2="312" y2="360"/>
    <line x1="312" y1="360" x2="361.1" y2="350.2"/>
    <line x1="361.1" y1="350.2" x2="412.9" y2="343"/>
    <line x1="412.9" y1="343" x2="512" y2="351.6"/>
    <line x1="512" y1="351.6" x2="611.1" y2="343"/>
    <line x1="611.1" y1="343" x2="712" y2="360"/>
    <line x1="736.5" y1="251.7" x2="712" y2="360"/>
    <!-- left eye socket -->
    <line x1="312" y1="360" x2="319.2" y2="419"/>
    <line x1="361.1" y1="350.2" x2="360.5" y2="400.9"/>
    <line x1="412.9" y1="343" x2="432.5" y2="413.6"/>
    <line x1="360.5" y1="400.9" x2="432.5" y2="413.6"/>
    <line x1="360.5" y1="400.9" x2="319.2" y2="419"/>
    <line x1="432.5" y1="413.6" x2="372.2" y2="440.4"/>
    <line x1="319.2" y1="419" x2="372.2" y2="440.4"/>
    <!-- right eye socket -->
    <line x1="712" y1="360" x2="704.8" y2="419"/>
    <line x1="611.1" y1="343" x2="591.5" y2="413.6"/>
    <line x1="663.5" y1="400.9" x2="591.5" y2="413.6"/>
