    <line x1="591.5" y1="413.6" x2="512" y2="424.2"/>
    <!-- nose to mouth -->
    <line x1="512" y1="424.2" x2="512" y2="484.8"/>
    <line x1="512" y1="484.8" x2="512" y2="543.7"/>
    <line x1="512" y1="543.7" x2="465" y2="562.1"/>
    <line x1="512" y1="543.7" x2="559" y2="562.1"/>
    <line x1="465" y1="562.1" x2="512" y2="574"/>
    <line x1="559" y1="562.1" x2="512" y2="574"/>
    <line x1="465" y1="562.1" x2="559" y2="562.1"/>
