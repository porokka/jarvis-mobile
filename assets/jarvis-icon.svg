    <circle cx="512" cy="351.6" r="7"/>
    <circle cx="611.1" cy="343" r="7"/>
    <circle cx="712" cy="360" r="7"/>
    <circle cx="512" cy="424.2" r="7"/>
    <circle cx="512" cy="484.8" r="7"/>
    <circle cx="512" cy="543.7" r="7"/>
    <circle cx="465" cy="562.1" r="7"/>
    <circle cx="559" cy="562.1" r="7"/>
    <circle cx="512" cy="574" r="7"/>
    <circle cx="278.5" cy="478.8" r="7"/>
    <circle cx="745.5" cy="478.8" r="7"/>
    <circle cx="289.9" cy="579.2" r="7"/>
    <circle cx="734.1" cy="579.2" r="7"/>
    <circle cx="425.3" cy="628.5" r="7"/>
    <circle cx="598.7" cy="628.5" r="7"/>
    <circle cx="472.8" cy="613" r="7"/>
    <circle cx="512" cy="609.1" r="7"/>
    <circle cx="551.2" cy="613" r="7"/>
    <circle cx="472.7" cy="648.2" r="7"/>
    <circle cx="512" cy="656.1" r="7"/>
    <circle cx="551.3" cy="648.2" r="7"/>
    <circle cx="287.9" cy="639.6" r="7"/>
    <circle cx="736.1" cy="639.6" r="7"/>
    <circle cx="317.1" cy="720.9" r="7"/>
    <circle cx="706.9" cy="720.9" r="7"/>
    <circle cx="371.1" cy="788.9" r="7"/>
