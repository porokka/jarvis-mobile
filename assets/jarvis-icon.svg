    <line x1="319.2" y1="419" x2="278.5" y2="478.8"/>
    <line x1="278.5" y1="478.8" x2="289.9" y2="579.2"/>
    <line x1="372.2" y1="440.4" x2="278.5" y2="478.8"/>
