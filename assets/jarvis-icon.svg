  </g>

  <!-- Eye socket nodes (brighter, larger) -->
  <g fill="#40a0f0" opacity="0.95" filter="url(#eyeglow)">
    <circle cx="361.1" cy="350.2" r="9"/>
    <circle cx="360.5" cy="400.9" r="9"/>
    <circle cx="432.5" cy="413.6" r="9"/>
    <circle cx="319.2" cy="419" r="9"/>
    <circle cx="372.2" cy="440.4" r="9"/>
    <circle cx="663.5" cy="400.9" r="9"/>
    <circle cx="591.5" cy="413.6" r="9"/>
