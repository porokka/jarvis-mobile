    <line x1="371.1" y1="788.9" x2="452.1" y2="827.7"/>
    <line x1="652.9" y1="788.9" x2="571.9" y2="827.7"/>
    <line x1="452.1" y1="827.7" x2="512" y2="851.3"/>
    <line x1="571.9" y1="827.7" x2="512" y2="851.3"/>
    <!-- chin -->
    <line x1="512" y1="851.3" x2="430.3" y2="905"/>
    <line x1="512" y1="851.3" x2="593.7" y2="905"/>
    <line x1="452.1" y1="827.7" x2="430.3" y2="905"/>
    <line x1="571.9" y1="827.7" x2="593.7" y2="905"/>
  </g>

  <!-- Eye socket bright lines (extra glow on eye edges) -->
  <g stroke="#40a0f0" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5" filter="url(#eyeglow)">
    <line x1="360.5" y1="400.9" x2="432.5" y2="413.6"/>
    <line x1="360.5" y1="400.9" x2="319.2" y2="419"/>
    <line x1="432.5" y1="413.6" x2="372.2" y2="440.4"/>
    <line x1="319.2" y1="419" x2="372.2" y2="440.4"/>
    <line x1="663.5" y1="400.9" x2="591.5" y2="413.6"/>
    <line x1="663.5" y1="400.9" x2="704.8" y2="419"/>
    <line x1="591.5" y1="413.6" x2="651.8" y2="440.4"/>
    <line x1="704.8" y1="419" x2="651.8" y2="440.4"/>
  </g>

  <!-- Regular nodes -->
  <g fill="#40a0f0" opacity="0.82" filter="url(#glow)">
    <circle cx="512" cy="121.8" r="7"/>
    <circle cx="368.1" cy="166.5" r="7"/>
    <circle cx="655.9" cy="166.5" r="7"/>
    <circle cx="287.5" cy="251.7" r="7"/>
    <circle cx="736.5" cy="251.7" r="7"/>
    <circle cx="391.2" cy="236.9" r="7"/>
