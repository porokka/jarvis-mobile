    <line x1="551.3" y1="648.2" x2="598.7" y2="628.5"/>
    <!-- jaw sides -->
    <line x1="289.9" y1="579.2" x2="287.9" y2="639.6"/>
    <line x1="734.1" y1="579.2" x2="736.1" y2="639.6"/>
    <line x1="287.9" y1="639.6" x2="317.1" y2="720.9"/>
